name: Nightly build

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/nightly.yml"
      - "MC.Xbox/**"
      - "glfw_shim/**"
      - "compat_mod/**"
      - "patch/**"
      - "scripts/**"
      - "log_configs/**"
      - "mesa-runtime/**"
      - "xboxone-runtime/**"
      - "build.ps1"
      - "xbox_security.properties"
  workflow_dispatch:

concurrency:
  group: nightly-build
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build and publish nightly
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: "25"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        shell: powershell
        run: python -m pip install --upgrade pip pillow

      - name: Clean generated outputs
        shell: powershell
        run: .\scripts\clean.ps1 -Apply

      - name: Restore Fabric remap cache
        uses: actions/cache@v4
        with:
          path: staging/cache/gameDir/.fabric/remappedJars
          key: fabric-remap-${{ runner.os }}-${{ hashFiles('scripts/config.ps1') }}

      - name: Prepare build cache
        shell: powershell
        run: .\scripts\prepare-ci-cache.ps1

      - name: Resolve nightly package version
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          [xml]$manifest = Get-Content MC.Xbox\Package.appxmanifest
          $parts = ([string]$manifest.Package.Identity.Version) -split '\.'
          if ($parts.Count -ne 4) {
            throw "Package.appxmanifest Identity Version must have four numeric fields."
          }

          $base = "$($parts[0]).$($parts[1]).$($parts[2])"
          $revision = 1
          $repo = $env:GITHUB_REPOSITORY
          $apiBase = if ($env:GITHUB_API_URL) { $env:GITHUB_API_URL } else { "https://api.github.com" }
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          try {
            $release = Invoke-RestMethod -Method Get -Uri "$apiBase/repos/$repo/releases/tags/nightly" -Headers $headers
            if ($release.body -match 'Package version:\s+(\d+)\.(\d+)\.(\d+)\.(\d+)') {
              $previousBase = "$($Matches[1]).$($Matches[2]).$($Matches[3])"
              if ($previousBase -eq $base) {
                $revision = [int]$Matches[4] + 1
              }
            }
          } catch {
            $statusCode = $null
            if ($_.Exception.Response) {
              $statusCode = [int]$_.Exception.Response.StatusCode
            }
            if ($statusCode -ne 404) {
              throw
            }
          }

          if ($revision -gt 65535) {
            throw "Nightly APPX revision exceeded 65535 for base $base."
          }

          $version = "$base.$revision"
          "APPX_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APPX_FILE=BanditLauncher_$version.appx" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Nightly APPX version: $version"

      - name: Build APPX
        shell: powershell
        run: .\build.ps1 -SkipStopAppProcesses -AppxVersion $env:APPX_VERSION

      - name: Stage nightly asset
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "output\$env:APPX_FILE" dist\BanditLauncher-nightly.appx -Force
          $hash = Get-FileHash dist\BanditLauncher-nightly.appx -Algorithm SHA256
          "$($hash.Hash.ToLowerInvariant())  BanditLauncher-nightly.appx" | Set-Content -Path dist\BanditLauncher-nightly.sha256 -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BanditLauncher-nightly
          path: |
            dist/BanditLauncher-nightly.appx
            dist/BanditLauncher-nightly.sha256
          if-no-files-found: error

      - name: Move nightly tag
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly $env:GITHUB_SHA
          git push --force origin refs/tags/nightly

      - name: Publish nightly release
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = $env:GITHUB_REPOSITORY
          $runUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $notes = @"
          Automated nightly build from $shortSha.

          Package version: $env:APPX_VERSION

          Nightly releases are highly experimental builds for testing current development work. They are not full game releases, and support is not provided for nightly builds.

          Redistribution of the APPX package is not permitted without prior written permission, as described in the project license. Video tutorials or other public install guides for these nightly builds are not permitted until the full release.

          Commit: $env:GITHUB_SHA
          Workflow run: $runUrl
          "@

          $apiBase = if ($env:GITHUB_API_URL) { $env:GITHUB_API_URL } else { "https://api.github.com" }
          $repoApi = "$apiBase/repos/$repo"
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          function Invoke-GitHubJson {
            param(
              [Parameter(Mandatory = $true)][string]$Method,
              [Parameter(Mandatory = $true)][string]$Uri,
              [object]$Body
            )

            $args = @{
              Method = $Method
              Uri = $Uri
              Headers = $headers
            }
            if ($null -ne $Body) {
              $args.Body = ($Body | ConvertTo-Json -Depth 10)
              $args.ContentType = "application/json"
            }

            return Invoke-RestMethod @args
          }

          $release = $null
          try {
            $release = Invoke-GitHubJson -Method Get -Uri "$repoApi/releases/tags/nightly"
          } catch {
            $statusCode = $null
            if ($_.Exception.Response) {
              $statusCode = [int]$_.Exception.Response.StatusCode
            }
            if ($statusCode -ne 404) {
              throw
            }
          }

          $releaseBody = @{
            tag_name = "nightly"
            target_commitish = $env:GITHUB_SHA
            name = "nightly"
            body = $notes
            prerelease = $true
          }

          if ($release) {
            $release = Invoke-GitHubJson -Method Patch -Uri "$repoApi/releases/$($release.id)" -Body $releaseBody
            $assets = Invoke-GitHubJson -Method Get -Uri "$repoApi/releases/$($release.id)/assets"
            foreach ($asset in @($assets)) {
              if ($asset.name -eq "BanditLauncher-nightly.appx" -or $asset.name -eq "BanditLauncher-nightly.sha256") {
                Invoke-GitHubJson -Method Delete -Uri "$repoApi/releases/assets/$($asset.id)" | Out-Null
              }
            }
          } else {
            $release = Invoke-GitHubJson -Method Post -Uri "$repoApi/releases" -Body $releaseBody
          }

          gh release upload nightly dist\BanditLauncher-nightly.appx dist\BanditLauncher-nightly.sha256 --clobber
